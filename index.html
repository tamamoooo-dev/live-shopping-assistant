<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6d28d9" />
  <title>Souq — Live shopping search</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <h1 class="brand-name">Souq</h1>
      </div>
      <p class="tagline">Search live prices across Saudi stores.</p>
    </header>

    <main class="main">
      <div class="mode" role="tablist" aria-label="Search mode">
        <button id="mode-all" class="mode-btn is-active" type="button" role="tab" aria-selected="true">All stores</button>
        <button id="mode-single" class="mode-btn" type="button" role="tab" aria-selected="false">Single store</button>
      </div>

      <form id="search-form" class="search" role="search" autocomplete="off">
        <input
          id="search-input"
          class="search-input"
          type="search"
          name="q"
          placeholder="Search a product…  (e.g. milk, بوك, iphone)"
          enterkeyhint="search"
          aria-label="Product name"
        />
        <button id="search-button" class="search-button" type="submit">Search</button>
      </form>

      <!-- Single-store mode: dropdown -->
      <div id="single-controls" class="controls" hidden>
        <label class="store-label" for="store-select">Store</label>
        <select id="store-select" class="store-select" aria-label="Store">
          <option value="panda" selected>Panda</option>
          <option value="amazon">Amazon (Experimental)</option>
          <option value="tamimi">Tamimi</option>
          <option value="danube">Danube</option>
          <option value="lulu">Lulu</option>
          <option value="noon">Noon</option>
        </select>
      </div>

      <!-- All-stores mode: checkbox chips -->
      <div id="multi-controls" class="controls chips" role="group" aria-label="Stores to search">
        <label class="chip chip-all"><input type="checkbox" id="chk-all" checked /><span class="box">✓</span><span>All</span></label>
        <label class="chip"><input type="checkbox" class="store-chk" value="panda" checked /><span class="box">✓</span><span>Panda</span></label>
        <label class="chip"><input type="checkbox" class="store-chk" value="amazon" checked /><span class="box">✓</span><span>Amazon</span></label>
        <label class="chip"><input type="checkbox" class="store-chk" value="tamimi" checked /><span class="box">✓</span><span>Tamimi</span></label>
        <label class="chip"><input type="checkbox" class="store-chk" value="danube" checked /><span class="box">✓</span><span>Danube</span></label>
        <label class="chip"><input type="checkbox" class="store-chk" value="lulu" checked /><span class="box">✓</span><span>Lulu</span></label>
        <label class="chip"><input type="checkbox" class="store-chk" value="noon" checked /><span class="box">✓</span><span>Noon</span></label>
      </div>

      <div id="loading" class="loading" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span id="loading-text">Searching…</span>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <div id="results" class="results"></div>

      <div id="empty" class="empty">
        <p>Search across <strong>6 Saudi stores</strong> at once — live prices, one place.</p>
        <div class="empty-stores">
          <span class="empty-chip"><span class="store-dot" style="background:#16a34a"></span>Panda</span>
          <span class="empty-chip"><span class="store-dot" style="background:#f59e0b"></span>Amazon</span>
          <span class="empty-chip"><span class="store-dot" style="background:#0ea5e9"></span>Tamimi</span>
          <span class="empty-chip"><span class="store-dot" style="background:#ef4444"></span>Danube</span>
          <span class="empty-chip"><span class="store-dot" style="background:#6366f1"></span>Lulu</span>
          <span class="empty-chip"><span class="store-dot" style="background:#eab308"></span>Noon</span>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
