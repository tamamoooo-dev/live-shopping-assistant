<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6b3a" />
  <title>Panda Live Search</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="header">
    <h1>Panda Live Search</h1>
    <p class="subtitle">Searches the live Panda website every time.</p>
  </header>

  <main class="main">
    <div class="store-row">
      <label class="store-label" for="store-select">Store</label>
      <select id="store-select" class="store-select" aria-label="Store">
        <option value="panda" selected>Panda</option>
        <option value="amazon">Amazon (Experimental)</option>
      </select>
    </div>

    <form id="search-form" class="search" role="search" autocomplete="off">
      <input
        id="search-input"
        class="search-input"
        type="search"
        name="q"
        placeholder="Search a product…  (e.g. بوك, Premium Care Size 6)"
        enterkeyhint="search"
        aria-label="Product name"
      />
      <button id="search-button" class="search-button" type="submit">Search</button>
    </form>

    <div id="loading" class="loading" hidden>
      <span class="spinner" aria-hidden="true"></span>
      <span id="loading-text">Searching Panda…</span>
    </div>

    <p id="status" class="status" role="status" aria-live="polite"></p>

    <ul id="results" class="results"></ul>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
